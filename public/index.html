<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA Panes - Pan de Papa Premium</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo"><img src="logo.png" alt="NOVA Panes"></div>
        <nav class="main-nav"><a href="index.html" class="active">Inicio</a><a href="shop.html">Tienda Online</a><a href="#contacto">Contacto</a></nav>
    </header>
    <main>
        <section style="background: linear-gradient(135deg, #FFECB3 0%, var(--bg-cream) 100%); padding: 100px 20px; border-radius: 0 0 80px 80px;">
            <div style="max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1.2fr; align-items: center; gap: 60px;">
                <div class="reveal active">
                    <h1 style="font-size: 5rem; color: var(--primary-red); line-height: 1;">Mucho más que un simple pan.</h1>
                    <a href="shop.html" class="cta-button" style="margin-top:30px;">HACER PEDIDO ONLINE</a>
                </div>
                <img src="hero-images/hero-pan.png" alt="Pan Nova" style="width: 100%; filter: drop-shadow(0 30px 60px rgba(0,0,0,0.12));">
            </div>
        </section>

        <section class="text-center reveal">
            <h2 style="font-size: 3.5rem; margin-bottom: 50px;">Nuestra Variedad</h2>
            <div class="range-grid">
                <div class="range-item"><div class="circle-img"><img src="productos/pan-de-papa-1.png"></div><h3>Hamburguesa</h3></div>
                <div class="range-item"><div class="circle-img"><img src="productos/pancho-1.png"></div><h3>Panchos</h3></div>
                <div class="range-item"><div class="circle-img"><img src="productos/pan-de-molde-1.png"></div><h3>Especiales</h3></div>
                <div class="range-item"><div class="circle-img"><img src="hero-images/hero-pan-1.png"></div><h3>Combos</h3></div>
            </div>
        </section>

        <section id="contacto" class="bottom-section reveal">
            <div class="contact-form-container">
                <h2 style="font-size: 3rem; margin-bottom: 30px;">Hablemos</h2>
                <form id="contactForm">
                    <input type="text" name="nombre" placeholder="Nombre completo *" required>
                    <input type="email" name="email" placeholder="Email (Opcional)">
                    <input type="tel" name="telefono" placeholder="WhatsApp *" required>
                    <textarea name="mensaje" placeholder="¿Cómo podemos ayudarte?" rows="5"></textarea>
                    <button type="submit" class="cta-button">ENVIAR CONSULTA</button>
                </form>
                <div id="formMessage" style="margin-top: 20px; display: none; font-weight: 600;"></div>
            </div>
            <div class="map-container" style="border-radius: 30px; overflow: hidden; box-shadow: var(--soft-shadow);">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3277.5072069442663!2d-58.32628522371521!3d-34.768004566194065!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x95a32d9aa509b157%3A0xfb46fa1faf63823b!2sGrupo%20FeSa!5e0!3m2!1ses!2sar!4v1710000000000" width="100%" height="450" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </section>
    </main>
    <footer class="footer">
        <h2>NOVA Panes®</h2>
        <div class="footer-links"><a href="https://wa.me/5491164372200" class="footer-btn">📱 WHATSAPP</a><a href="https://instagram.com/nova.panes" class="footer-btn">📷 INSTAGRAM</a></div>
        <div class="footer-legal">Razón Social: GRUPO FESA S. CAP I SECC IV | CUIT: 30-71821628-8</div>
    </footer>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
            }, { threshold: 0.1 });
            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
            document.getElementById('contactForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const msg = document.getElementById('formMessage');
                fetch('/api/contact', { method: 'POST', body: new URLSearchParams(new FormData(this)) })
                .then(res => res.json()).then(data => {
                    msg.innerText = data.message; msg.style.display = 'block';
                    msg.style.color = data.success ? '#2E7D32' : '#D32F2F';
                    if(data.success) this.reset();
                });
            });
        });
    </script>
</body>
</html>
