<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA Panes - El auténtico Pan de Papa</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo"><img src="logo.png" alt="NOVA Panes"></div>
        <nav class="main-nav">
            <a href="index.html" class="active">Inicio</a>
            <a href="shop.html">Shop</a>
            <a href="shop.html" class="header-cart-icon">🛒 CARRITO</a>
        </nav>
    </header>

    <main>
        <section style="background: linear-gradient(135deg, #FFECB3 0%, var(--bg-cream) 100%); padding: 100px 20px; border-radius: 0 0 60px 60px;">
            <div style="max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1.2fr; align-items: center; gap: 60px;">
                <div>
                    <h1 style="font-size: 5rem; color: var(--primary-red); line-height: 1.1; margin-bottom: 25px;">El secreto de una gran hamburguesa.</h1>
                    <p style="font-size: 1.3rem; color: var(--text-light); margin-bottom: 40px;">Suavidad inigualable y frescura diaria para tu familia o negocio.</p>
                    <a href="shop.html" style="background: var(--primary-red); color: white; padding: 22px 50px; border-radius: 60px; text-decoration: none; font-weight: 700; display: inline-block;">VER TIENDA ONLINE</a>
                </div>
                <img src="hero-images/hero-pan.png" alt="Pan Nova" style="width: 100%; filter: drop-shadow(0 30px 60px rgba(0,0,0,0.15));">
            </div>
        </section>

        <section style="max-width: 1200px; margin: 100px auto; padding: 0 20px;">
            <h2 style="font-size: 3.5rem; text-align: center; margin-bottom: 70px;">Nuestros Favoritos</h2>
            <div id="product-gallery-index" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px;"></div>
        </section>
    </main>

    <footer class="footer">
        <h2 style="color: white;">NOVA Panes®</h2>
        <div class="footer-links">
            <a href="https://wa.me/5491164372200" class="footer-btn whatsapp-btn">📱 WHATSAPP</a>
        </div>
        <p>Razón Social: GRUPO FESA S. CAP I SECC IV | CUIT: 30-71821628-8</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetch('/products.json') // Cambiado a .json para que coincida con tu lógica funcional
                .then(res => res.json())
                .then(products => {
                    const gallery = document.getElementById('product-gallery-index');
                    gallery.innerHTML = products.slice(0, 3).map(p => `
                        <div style="background: white; border-radius: 30px; padding: 35px; text-align: center; box-shadow: var(--soft-shadow);">
                            <img src="${p.image}" alt="${p.name}" style="width: 100%; height: 200px; object-fit: contain; margin-bottom: 25px;">
                            <h3>${p.name}</h3>
                            <a href="shop.html" style="color: var(--primary-red); font-weight: 700; text-decoration: none;">VER EN TIENDA</a>
                        </div>
                    `).join('');
                });
        });
    </script>
</body>
</html>
