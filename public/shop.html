<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda - NOVA Panes</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="shop-styles.css">
</head>
<body class="sticky-header-page">

    <header>
        <div class="logo"><img src="logo.png" alt="NOVA Panes"></div>
        <nav class="main-nav">
            <a href="index.html">Inicio</a>
            <a href="shop.html" class="active">Tienda Online</a>
            <a href="#" id="headerCartIcon" class="header-cart-icon">🛒 Carrito (<span id="cartCount">0</span>)</a>
        </nav>
    </header>

    <div class="shop-hero">
        <h1>Nuestra Panadería</h1>
        <p>Seleccioná tus productos y recibilos en tu domicilio.</p>
    </div>

    <!-- LOGO SCROLLER (Marcas) -->
    <div class="logo-scroller-container">
        <div class="logo-scroller" id="logo-scroller"></div>
    </div>

    <main class="shop-main">
        <div class="shop-search-container"><input type="search" id="searchInput" placeholder="¿Qué estás buscando?"></div>
        <div class="filter-container" id="filter-container"></div>
        <div id="shopProducts"></div>
    </main>

    <!-- NEWSLETTER (Estilo Bakers Delight) -->
    <section style="background: white; border-radius: 60px; margin: 0 50px 100px; text-align: center; box-shadow: var(--soft-shadow);">
        <h2 style="font-size: 2.5rem; color: var(--primary-red);">¡No te pierdas de nada!</h2>
        <p style="margin: 20px 0 40px;">Recibí ofertas exclusivas y novedades de nuestra panadería.</p>
        <div style="max-width: 500px; margin: 0 auto; display: flex; gap: 10px;">
            <input type="email" placeholder="Tu email" style="flex: 1; padding: 15px; border-radius: 50px; border: 1px solid #DDD;">
            <button style="background: var(--text-dark); color: white; border: none; padding: 15px 30px; border-radius: 50px; font-weight: 700; cursor: pointer;">UNIRSE</button>
        </div>
    </section>

    <!-- MODALES (Carrito y Checkout) - Se mantienen con la lógica exacta -->
    <div id="cartModal" class="cart-modal">...</div>
    <div id="checkoutModal" class="checkout-modal">...</div>

    <footer class="footer">...</footer>

    <script src="shop-script.js"></script>
</body>
</html>
