<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Online - NOVA Panes</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="shop-styles.css">
</head>
<body class="sticky-header-page">

    <div id="promoModal" class="promo-modal"><div class="promo-modal-overlay"></div><div class="promo-modal-content"><span id="closePromoModal" style="cursor:pointer; float:right;">&times;</span><a id="promoLink" href="#"><img id="promoImage" src="" style="width:100%"><div class="promo-modal-title">Oferta!</div></a></div></div>

    <header>
        <div class="logo"><img src="logo.png" alt="NOVA Panes"></div>
        <nav class="main-nav">
            <a href="index.html">Inicio</a>
            <a href="shop.html" class="active">Shop</a>
            <a href="#" id="headerCartIcon" class="header-cart-icon">🛒 Carrito (<span id="cartCount">0</span>)</a>
        </nav>
    </header>

    <div class="shop-hero">
        <h1>Nuestra Panadería</h1>
        <p>Frescura artesanal directo a tu puerta.</p>
    </div>

    <div class="logo-scroller-container"><div class="logo-scroller" id="logo-scroller"></div></div>

    <main class="shop-main">
        <div class="shop-search-container"><input type="search" id="searchInput" placeholder="¿Qué buscás hoy?"></div>
        <div class="filter-container" id="filter-container"></div>
        <div id="shopProducts"></div>
    </main>

    <!-- MODAL CARRITO -->
    <div id="cartModal" class="cart-modal">
        <div class="cart-modal-content">
            <div class="cart-header"><h2>Tu Carrito</h2><span class="close-cart" style="cursor:pointer">&times;</span></div>
            <div id="cartItems"></div>
            <div class="cart-footer">
                <p>Costo envío: $8.000 (GBA Sur/CABA gratis > $75k)</p>
                <div class="cart-total"><strong>Total: $<span id="cartTotal">0</span></strong></div>
                <div id="minPurchaseMessage" style="color: red; font-size: 0.8rem;"></div>
                <button id="clearCart" class="btn-secondary" style="margin-bottom:10px">Vaciar</button>
                <button id="checkout" class="btn-primary">Finalizar Compra</button>
            </div>
        </div>
    </div>

    <!-- MODAL CHECKOUT -->
    <div id="checkoutModal" class="checkout-modal">
        <div class="checkout-modal-content">
            <div class="checkout-header"><h2>Finalizar Compra</h2><span class="close-checkout" style="cursor:pointer">&times;</span></div>
            <form id="checkoutForm">
                <input type="text" name="nombre" placeholder="Nombre completo *" required style="width:100%; margin:10px 0; padding:10px">
                <input type="email" name="email" placeholder="Email *" required style="width:100%; margin:10px 0; padding:10px">
                <input type="tel" name="telefono" placeholder="Teléfono *" required style="width:100%; margin:10px 0; padding:10px">
                
                <div style="margin:20px 0">
                    <label><input type="radio" name="metodoEntrega" value="Envío a Domicilio" checked> Envío</label>
                    <label style="margin-left:20px"><input type="radio" name="metodoEntrega" value="Retiro en Fábrica"> Retiro</label>
                </div>

                <div id="deliveryAddressContainer">
                    <input type="text" name="direccion" placeholder="Dirección *" style="width:100%; margin:5px 0; padding:10px">
                    <input type="text" name="ciudad" placeholder="Ciudad *" style="width:100%; margin:5px 0; padding:10px">
                    <select name="horarioEntrega" id="deliveryTimeSelect" style="width:100%; margin:10px 0; padding:10px">
                        <option value="10 a 14 hs">10 a 14 hs</option>
                        <option value="14 a 18 hs">14 a 18 hs</option>
                    </select>
                </div>

                <select name="metodoPago" id="paymentMethodSelect" required style="width:100%; margin:10px 0; padding:10px">
                    <option value="efectivo">Efectivo</option>
                    <option value="transferencia">Transferencia</option>
                    <option value="mercadopago">Mercado Pago</option>
                </select>

                <div id="transferInfo" style="display:none; background:#F9F9F9; padding:15px; border-radius:10px; font-size:0.8rem">
                    Alias: <b>novapanes</b><br>CUIT: <b>20-33785913-6</b>
                </div>

                <div id="orderItems" style="margin-top:20px; font-size:0.9rem"></div>
                <div style="text-align:right; margin:10px 0">Total: $<span id="orderTotal">0</span></div>

                <button type="button" class="close-checkout-btn btn-secondary" style="margin-bottom:10px">Cancelar</button>
                <button type="submit" class="btn-primary">Confirmar Pedido</button>
            </form>
        </div>
    </div>

    <footer class="footer"><h2>NOVA Panes®</h2><p>CUIT: 30-71821628-8</p></footer>
    <script src="shop-script.js"></script>
</body>
</html>
