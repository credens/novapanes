<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA Panes</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@700&family=Poppins:wght@400&display=swap" rel="stylesheet">
</head>
<body>

    <div class="hero-background">
        <header>
            <nav class="main-nav">
                <a href="#">Inicio</a>
                <a href="#">Productos</a>
            </nav>
            <div class="logo">
                <img src="logo.png" alt="NOVA Panes Logo">
            </div>
            <nav class="main-nav">
                <a href="#">Quiénes Somos</a>
                <a href="#">Contacto</a>
            </nav>
        </header>

        <main class="hero-section">
            <div class="hero-text">
                <h1>Reúnete con amigos y disfruta de unas deliciosas hamburguesas.</h1>
            </div>
            <div class="hero-image">
                <img src="panes.jpg" alt="Paquete de Pan de Papa NOVA Panes">
            </div>
        </main>
    </div>

    <section class="bottom-section">
        <div class="contact-form-container">
            <h2>Quiénes Somos</h2>
            <form action="#" method="post">
                <input type="text" name="nombre" placeholder="Nombre" required>
                <input type="email" name="email" placeholder="Correo electrónico" required>
                <textarea name="mensaje" placeholder="Mensaje" rows="4" required></textarea>
                <button type="submit">Enviar</button>
            </form>
        </div>

        <div class="contact-info-container">
            <h2>Contacto</h2>
            <div class="map-container">
                <img src="map.png" alt="Ubicación en el mapa">
                <a href="#" class="map-link">Ver en Google Maps</a>
            </div>
        </div>
    </section>

</body>
</html>
