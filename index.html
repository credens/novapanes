<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA Panes</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@700&family=Poppins:wght@400&display=swap" rel="stylesheet">
</head>
<body>

    <div class="hero-background">
        <header>
            <nav class="main-nav">
                <a href="#">Inicio</a>
                <a href="#productos">Productos</a>
            </nav>
            <div class="logo">
                <img src="logo.png" alt="NOVA Panes Logo">
            </div>
            <nav class="main-nav">
                <a href="#quienes-somos">Quiénes Somos</a>
                <a href="#contacto">Contacto</a>
            </nav>
        </header>

        <main class="hero-section">
            <div class="hero-text">
                <h1>Reúnete con amigos y disfruta de unas deliciosas hamburguesas.</h1>
            </div>
            <div class="hero-image">
                <img src="panes.jpg" alt="Paquete de Pan de Papa NOVA Panes">
            </div>
        </main>
    </div>

    <hr class="section-divider">

    <section id="productos" class="products-section">
        <h2>Nuestros Productos</h2>
        <div class="product-gallery">
            
            <div class="product-card">
                <img src="productos/panes.jpg" alt="Pan Brioche">
                <h3>Pan de Papa</h3>
            </div>

            <div class="product-card">
                <img src="productos/sesamo.jpg" alt="Pan de hamburguesa con sésamo">
                <h3>Pan de hamburguesa con sésamo</h3>
            </div>

            <div class="product-card">
                <img src="productos/burger2.jpg" alt="Pan de papa con parmesano">
                <h3>Pan de papa con parmesano</h3>
            </div>

            <div class="product-card">
                <img src="productos/lomito.jpg" alt="Pan de lomito / pancho doble con queso">
                <h3>Pan de lomito / pancho doble con queso</h3>
            </div>

        </div>
    </section>
